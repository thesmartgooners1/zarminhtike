<!DOCTYPE html>
<html>
<head>
  <title>My Blog App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    .app-bar {
      background: #111;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      position: sticky;
      top: 0;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: #fff;
      border-radius: 15px;
      margin-bottom: 15px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:active {
      transform: scale(0.98);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .title a {
      text-decoration: none;
      color: #111;
    }

    .desc {
      font-size: 13px;
      color: #555;
      line-height: 1.4;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      background: #111;
      color: #fff;
      border-radius: 8px;
      font-size: 12px;
      text-decoration: none;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="app-bar">
  My Blog
</div>

<div class="container" id="posts">
  <div class="loading">Loading posts...</div>
</div>

<script>
async function loadPosts() {
  const container = document.getElementById("posts");

  try {
    const apiURL = "https://zarminhtike.wordpress.com/wp-json/wp/v2/posts?_embed";

    // Fix CORS using proxy
    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(apiURL));
    const data = await res.json();

    if (!data || data.length === 0) {
      container.innerHTML = "<p>No posts found.</p>";
      return;
    }

    let html = "";

    data.forEach(post => {
      const title = post.title.rendered;
      const link = post.link;

      const content = post.excerpt.rendered;
      const cleanContent = content.replace(/<[^>]*>/g, "");

      let image = "";
      if (post._embedded && post._embedded["wp:featuredmedia"]) {
        image = post._embedded["wp:featuredmedia"][0].source_url;
      }

      html += `
        <div class="card">
          ${image ? `<img src="${image}" alt="">` : ""}
          <div class="title">
            <a href="${link}" target="_blank">${title}</a>
          </div>
          <div class="desc">
            ${cleanContent.substring(0, 120)}...
          </div>
          <a class="btn" href="${link}" target="_blank">Read</a>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (error) {
    container.innerHTML = "<p>Error loading posts.</p>";
    console.error(error);
  }
}

loadPosts();
</script>

</body>
</html>
