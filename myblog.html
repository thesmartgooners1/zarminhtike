<!DOCTYPE html>
<html>
<head>
  <title>My Blog App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #f2f2f2;
      --text: #111;
      --card-bg: #fff;
      --btn-bg: #111;
      --btn-text: #fff;
    }

    body.dark-mode {
      --bg: #121212;
      --text: #eee;
      --card-bg: #1e1e1e;
      --btn-bg: #eee;
      --btn-text: #111;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    .app-bar {
      background: var(--btn-bg);
      color: var(--btn-text);
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle-btn {
      padding: 6px 12px;
      font-size: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--btn-text);
      color: var(--btn-bg);
      transition: 0.3s;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 15px;
      margin-bottom: 15px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, background 0.3s;
    }

    .card:active {
      transform: scale(0.98);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .title a {
      text-decoration: none;
      color: var(--text);
    }

    .desc {
      font-size: 13px;
      color: var(--text);
      opacity: 0.8;
      line-height: 1.4;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border-radius: 8px;
      font-size: 12px;
      text-decoration: none;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--text);
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="app-bar">
  My Blog
  <button class="toggle-btn" onclick="toggleDarkMode()">Dark Mode</button>
</div>

<div class="container" id="posts">
  <div class="loading">Loading posts...</div>
</div>

<script>
function toggleDarkMode() {
  document.body.classList.toggle("dark-mode");
}

async function loadPosts() {
  const container = document.getElementById("posts");
  const apiURL = "https://public-api.wordpress.com/wp/v2/sites/zarminhtike.wordpress.com/posts";

  try {
    const res = await fetch(apiURL);
    const data = await res.json();

    if (!data || data.length === 0) {
      container.innerHTML = "<p>No posts found.</p>";
      return;
    }

    let html = "";

    data.forEach(post => {
      const title = post.title || "No Title";
      const link = post.URL;
      const excerpt = post.excerpt || "";
      const cleanExcerpt = excerpt.replace(/<[^>]*>/g, "").substring(0, 120);

      let image = "";
      if (post.featured_media_urls && post.featured_media_urls.full) {
        image = post.featured_media_urls.full;
      }

      html += `
        <div class="card">
          ${image ? `<img src="${image}" alt="">` : ""}
          <div class="title">
            <a href="${link}" target="_blank">${title}</a>
          </div>
          <div class="desc">${cleanExcerpt}...</div>
          <a class="btn" href="${link}" target="_blank">Read</a>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (error) {
    container.innerHTML = "<p>Error loading posts.</p>";
    console.error(error);
  }
}

loadPosts();
</script>

</body>
</html>
